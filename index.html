<style>

/* ===== NEKOPON QUIZ の見た目と手ざわり ===== */
:root{
  --primary-brown:#8b4513;
  --light-brown:#d2691e;
  --cream:#faf8f5;
  --soft-orange:#ff7f50;
  --gold:#ffd700;
  --pink:#ffb6c1;
  --neko-shadow:rgba(139,69,19,.22);
}
html,body{background:var(--cream);color:var(--primary-brown);font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif}
body{background-image:radial-gradient(circle at 8% 8%,rgba(255,182,193,.16),transparent 24%),radial-gradient(circle at 92% 15%,rgba(255,215,0,.13),transparent 20%),radial-gradient(circle at 50% 100%,rgba(255,127,80,.12),transparent 28%)}
.app{position:relative;isolation:isolate;overflow-x:hidden;background:transparent}
.app:before{content:"🐾";position:fixed;z-index:-1;right:-12px;top:18%;font-size:84px;opacity:.035;transform:rotate(-18deg);pointer-events:none}
.app:after{content:"🐾";position:fixed;z-index:-1;left:-14px;bottom:12%;font-size:72px;opacity:.035;transform:rotate(22deg);pointer-events:none}
.top{padding-top:12px}
.brand{position:relative;align-items:flex-start}
.brand-copy{min-width:0;text-align:center;flex:1}
.neko-kicker{display:flex;align-items:center;justify-content:center;gap:7px;margin:0!important;color:var(--light-brown)!important;font-size:12px!important;letter-spacing:.03em}
.brand-cat{display:inline-block;font-size:20px;filter:drop-shadow(0 3px 5px rgba(139,69,19,.18));animation:neko-cat-float 3.5s ease-in-out infinite}
.brand-cat:last-child{animation-delay:.65s}
.brand h1{font-weight:900;color:var(--primary-brown);font-size:clamp(20px,5vw,28px);line-height:1.35;letter-spacing:.01em;animation:neko-title-enter .85s cubic-bezier(.25,.8,.25,1.2) both}
.school-version{display:inline-block!important;margin:-6px 0 9px!important;padding:3px 12px;border:1.5px solid var(--soft-orange);border-radius:999px;background:#fff8f0;color:var(--light-brown)!important;font-size:11px!important;font-weight:900;letter-spacing:.06em;box-shadow:0 3px 9px rgba(139,69,19,.09)}
.header-tools{display:flex;align-items:center;gap:7px;flex:none}
.count,.sound{border:2px solid var(--light-brown);background:#fff;color:var(--primary-brown);box-shadow:0 4px 12px var(--neko-shadow)}
.count{border-radius:18px;padding:8px 11px;white-space:nowrap}

.sound:hover{transform:translateY(-2px) scale(1.04);background:#fff8f0;box-shadow:0 8px 18px var(--neko-shadow)}

.neko-stats{max-width:620px;margin:0 auto 9px;display:flex;justify-content:center;gap:9px;padding:7px 15px;border-radius:24px;background:rgba(255,255,255,.48);box-shadow:0 7px 24px rgba(139,69,19,.1),inset 0 1px rgba(255,255,255,.8);backdrop-filter:blur(12px);animation:neko-stats-enter .8s ease .18s both}
.stat-bubble{display:flex;align-items:center;gap:5px;padding:4px 7px;border:0;background:transparent;color:var(--primary-brown);font-weight:900;font-size:13px;cursor:pointer;border-radius:14px;transition:transform .2s ease,background .2s ease,filter .2s ease}
.stat-bubble:hover{background:rgba(255,255,255,.55);transform:scale(1.06)}

.stat-icon{display:inline-block}
.stat-bubble:nth-child(1) .stat-icon{animation:gentle-sparkle 4s ease-in-out infinite}
.stat-bubble:nth-child(2) .stat-icon{animation:gentle-fire 3.5s ease-in-out .6s infinite}
.stat-bubble:nth-child(3) .stat-icon{animation:gentle-trophy 5s ease-in-out 1s infinite}
.subjects{gap:9px}
.subjects button,.chips button,.shuffle,.modes button,.actions button,.empty button{font-family:inherit;cursor:pointer;transition:transform .22s cubic-bezier(.25,.46,.45,.94),box-shadow .22s ease,background .22s ease,border-color .22s ease,filter .22s ease;-webkit-tap-highlight-color:transparent}
.subjects button{border:3px solid var(--light-brown);border-radius:16px;color:var(--primary-brown);box-shadow:0 4px 11px var(--neko-shadow);padding:10px 8px;background:#fff}
.subjects button:hover{transform:translateY(-3px) scale(1.02);background:#fff8f0;box-shadow:0 9px 20px var(--neko-shadow)}
.subjects button:active{transform:translateY(2px) scale(.96);box-shadow:0 2px 6px var(--neko-shadow)}
.subjects button.active{background:#ffe4cc;color:var(--soft-orange);border-color:var(--soft-orange);box-shadow:0 7px 18px var(--neko-shadow);transform:translateY(-2px)}
.subject-icon{display:inline-block;margin-right:3px;font-size:17px}
.progresscopy{color:#9a5a30;font-size:12px}
.track{height:9px;border:1px solid rgba(210,105,30,.17);background:#f0e7df;box-shadow:inset 0 2px 4px rgba(139,69,19,.08)}
.track i{background:linear-gradient(90deg,var(--light-brown),var(--soft-orange),var(--gold));position:relative;transition:width .55s cubic-bezier(.2,.8,.2,1)}
.track i:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 20%,rgba(255,255,255,.65) 44%,transparent 68%);animation:track-shine 2.6s linear infinite}
.modes{border:2px solid #ead2bf;border-radius:17px;box-shadow:0 3px 10px rgba(139,69,19,.09)}
.modes button{border-radius:12px;color:#a26745;padding:7px 5px}
.modes button:hover{background:#fff5ec;transform:translateY(-1px)}
.modes button:active{transform:scale(.94)}
.modes button.active{background:#ffe4cc;color:var(--soft-orange);box-shadow:0 3px 9px rgba(139,69,19,.12)}
.shuffle,.chips button{border:2px solid var(--light-brown);color:var(--primary-brown);box-shadow:0 3px 9px rgba(139,69,19,.14)}
.shuffle{background:var(--light-brown);color:#fff;border-radius:20px}
.shuffle:hover,.chips button:hover{transform:translateY(-2px);background:#fff8f0;box-shadow:0 7px 15px var(--neko-shadow)}
.shuffle:hover{background:var(--soft-orange);color:#fff}
.shuffle:active,.chips button:active{transform:translateY(2px) scale(.95);box-shadow:0 2px 5px var(--neko-shadow)}
.chips{padding:2px 1px 5px}
.chips button{background:#fff}
.chips button.active{background:#ffe4cc;color:var(--soft-orange);border-color:var(--soft-orange);transform:translateY(-1px)}
.card{border:3px solid var(--light-brown);border-radius:22px;box-shadow:0 11px 28px var(--neko-shadow);background:#fff;animation:card-pop-in .4s cubic-bezier(.25,.8,.25,1.25) both,card-soft-glow 4.2s ease-in-out 1s infinite}
.card:before{height:8px;background:linear-gradient(90deg,var(--light-brown),var(--soft-orange),var(--gold),var(--soft-orange))}
.card:hover{box-shadow:0 15px 34px rgba(139,69,19,.27)}
.card.is-back{animation:card-flip-in .35s ease both,card-soft-glow 4.2s ease-in-out 1s infinite}
.badge{background:#ffe4cc;color:var(--light-brown);border:1px solid #ffd1ad}
.unit{color:var(--light-brown)}
.hint{background:#fff3df;color:#9a5f2f;border:2px dashed #f4c899}
.guide{color:#a56a48;border-top-color:#ead5c5}.guide:before{content:"🐾 ";font-size:13px}
.block{background:#fff4ea;border:2px solid #f4cfaf}
.worked{background:#fffaf4;border:2px solid #ead5c5}
.back h2{color:var(--light-brown)}
.work{border:2px solid #f0d8c4;border-radius:15px}
.answer{background:linear-gradient(135deg,var(--light-brown),var(--soft-orange));box-shadow:0 7px 16px rgba(210,105,30,.25)}
.caution{background:#fff0dc;color:#8d592b;border:2px dashed #edbd8c}
.steps li{border-bottom-color:#ead9ca}
.actions{gap:8px}
.actions button{border:2px solid var(--light-brown);border-radius:16px;background:#fff;color:var(--primary-brown);box-shadow:0 4px 11px var(--neko-shadow)}
.actions button:hover{transform:translateY(-3px);box-shadow:0 8px 17px var(--neko-shadow);filter:brightness(1.03)}
.actions button:active{transform:translateY(2px) scale(.95);box-shadow:0 2px 5px var(--neko-shadow)}
.actions .again{background:#fff1dc;color:#a75e27}
.actions .done{background:var(--light-brown);color:#fff;border-color:var(--light-brown);animation:done-button-breathe 3s ease-in-out infinite}
.actions .done:hover{background:var(--soft-orange)}
.actions .done.celebrate{animation:done-celebrate .65s cubic-bezier(.2,.8,.2,1.25)!important}
.empty{border:3px solid var(--light-brown);background:#fff8f0;color:var(--primary-brown);box-shadow:0 11px 28px var(--neko-shadow);animation:card-pop-in .5s ease both}
.empty:before{content:"😸";display:block;font-size:52px;margin-bottom:6px;animation:neko-cat-float 2.4s ease-in-out infinite}
.empty button{background:var(--light-brown);border-radius:22px;box-shadow:0 5px 12px var(--neko-shadow)}
.empty button:hover{background:var(--soft-orange);transform:translateY(-2px)}
.tap-ripple{position:fixed;z-index:9998;width:12px;height:12px;border-radius:50%;background:rgba(255,215,0,.58);pointer-events:none;animation:neko-ripple .62s ease-out forwards}
.floating-points{position:fixed;z-index:9999;pointer-events:none;color:var(--soft-orange);font-size:17px;font-weight:900;text-shadow:0 2px 6px #fff;animation:float-points 1.5s ease-out forwards;white-space:nowrap}
.cute-particle{position:fixed;z-index:9997;pointer-events:none;font-size:15px;animation:cute-particle-burst 1.15s ease-out forwards}
.neko-notice{position:fixed;z-index:10000;left:50%;top:18px;transform:translate(-50%,-90px);padding:10px 18px;border:2px solid var(--light-brown);border-radius:22px;background:rgba(255,255,255,.94);color:var(--primary-brown);font-size:13px;font-weight:900;box-shadow:0 8px 24px var(--neko-shadow);transition:transform .32s cubic-bezier(.2,.8,.2,1.2);white-space:nowrap}.neko-notice.show{transform:translate(-50%,0)}
@keyframes neko-title-enter{0%{opacity:0;transform:translateY(-20px) scale(.86)}60%{opacity:1;transform:translateY(4px) scale(1.06)}100%{opacity:1;transform:none}}
@keyframes neko-cat-float{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(-3px) rotate(6deg)}65%{transform:translateY(1px) rotate(-4deg)}}
@keyframes neko-stats-enter{from{opacity:0;transform:translateY(-10px) scale(.94)}to{opacity:1;transform:none}}
@keyframes gentle-sparkle{0%,100%{filter:brightness(1);transform:scale(1)}50%{filter:brightness(1.4) drop-shadow(0 0 6px gold);transform:scale(1.12) rotate(7deg)}}
@keyframes gentle-fire{0%,100%{filter:brightness(1);transform:scale(1)}40%{filter:brightness(1.35);transform:scale(1.12) rotate(4deg)}70%{transform:scale(1.03) rotate(-3deg)}}
@keyframes gentle-trophy{0%,100%{filter:brightness(1);transform:scale(1)}50%{filter:brightness(1.35) drop-shadow(0 0 7px orange);transform:scale(1.1) rotate(5deg)}}
@keyframes track-shine{from{transform:translateX(-130%)}to{transform:translateX(160%)}}
@keyframes card-pop-in{from{opacity:0;transform:translateY(16px) scale(.965)}to{opacity:1;transform:none}}
@keyframes card-flip-in{0%{opacity:.45;transform:rotateY(22deg) scale(.97)}100%{opacity:1;transform:none}}
@keyframes card-soft-glow{0%,100%{box-shadow:0 11px 28px var(--neko-shadow)}50%{box-shadow:0 14px 34px rgba(210,105,30,.26)}}
@keyframes done-button-breathe{0%,100%{filter:brightness(1)}50%{filter:brightness(1.08);box-shadow:0 7px 17px rgba(210,105,30,.28)}}
@keyframes done-celebrate{0%{transform:scale(1)}35%{transform:scale(1.16) rotate(2deg)}65%{transform:scale(.96) rotate(-1deg)}100%{transform:scale(1)}}
@keyframes neko-ripple{0%{opacity:.9;transform:translate(-50%,-50%) scale(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(15)}}
@keyframes float-points{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-65px) scale(1.25)}}
@keyframes cute-particle-burst{0%{opacity:1;transform:translate(-50%,-50%) scale(0) rotate(0)}25%{opacity:1;transform:translate(calc(-50% + var(--dx)*.35),calc(-50% + var(--dy)*.35)) scale(1.2) rotate(120deg)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.55) rotate(360deg)}}
@media(max-width:520px){.brand{align-items:center}.brand h1{font-size:clamp(18px,5.2vw,23px);margin-bottom:7px}.neko-kicker{font-size:10px!important}.brand-cat{font-size:17px}.header-tools{gap:5px}.count{font-size:11px;padding:7px 9px}.sound{width:36px;height:36px;font-size:16px}.neko-stats{margin-bottom:8px;padding:6px 10px}.stat-bubble{font-size:11px;padding:3px 5px}.subjects button{font-size:12px;padding:8px 4px}.subject-icon{display:block;margin:0 0 2px}.card{border-radius:19px}.actions button{font-size:11px}.shuffle{font-size:11px;padding-left:10px;padding-right:10px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}

<script>
const CARDS=[{"id":"en-01","subject":"英語","unit":"be動詞","no":"No.1","question":"Ms. Green is a great teacher.","hint":"「〜です」の文。主語がMs. Green（1人）のとき、be動詞はどれ？","approach":"「AはBです」と言うときは、AとBを is でつなぎます。主語のMs. Greenは1人なので、be動詞は is。great は「すばらしい」と様子を説明する言葉で、teacher の前に置きます。","steps":["公式：主語 + is + 説明（名前や様子）","この文：Ms. Green（主語）+ is + a great teacher","ポイント：主語が1人・1つなら is、I なら am、you や複数なら are"],"answer":"グリーン先生は素晴らしい先生です。","mathHtml":"","answerMathHtml":""},{"id":"en-02","subject":"英語","unit":"be動詞","no":"No.2","question":"Are you a judo fan? - Yes, I am.","hint":"「〜ですか？」はbe動詞をどこへ動かす？答え方もセットで。","approach":"「あなたは〜ですか」とたずねるときは、are を you の前に出して Are you ...? にします。be動詞でたずねられたら、答えも be動詞で Yes, I am. / No, I am not. と返します。","steps":["公式：Are you ...? — Yes, I am. / No, I’m not.","この文：Are you a judo fan? → Yes, I am.","ポイント：Are で聞かれたら am で答える。Yes, I do. としない"],"answer":"あなたは柔道ファンですか。- はい、そうです。","mathHtml":"","answerMathHtml":""},{"id":"en-03","subject":"英語","unit":"be動詞","no":"No.3","question":"He is not a dancer.","hint":"「〜ではありません」。notを入れる場所は？","approach":"be動詞の文を「〜ではない」にするには、is のすぐ後ろに not を入れるだけです。He is not ... は He isn’t ... と短くも書けます。","steps":["公式：主語 + is not（isn’t）+ 説明","この文：He + is not + a dancer","ポイント：not の位置は be動詞のすぐ後ろ"],"answer":"彼はダンサーではありません。","mathHtml":"","answerMathHtml":""},{"id":"en-04","subject":"英語","unit":"be動詞","no":"No.4","question":"They are good at cooking.","hint":"「〜が得意」の言い方。atの後ろの形に注目。","approach":"「〜が得意です」は be good at 〜 で表します。at の後ろに動作を続けるときは、cook を cooking の形（「料理すること」という意味）にします。","steps":["公式：be good at + もの／動詞のing形","この文：They are good at + cooking（料理すること）","ポイント：at の後ろに cook をそのままの形では置けない"],"answer":"彼らは料理が得意です。","mathHtml":"","answerMathHtml":""},{"id":"en-05","subject":"英語","unit":"一般動詞","no":"No.5","question":"Do you play baseball on Sundays?","hint":"play（動作の言葉）の疑問文。文の先頭に置く単語は？","approach":"play のような動作を表す言葉（一般動詞）の疑問文は、文の先頭に Do を置きます。on Sundays と s が付くと「毎週日曜日に」という意味になります。","steps":["公式：Do you + 動詞（元の形）...?","この文：Do you play baseball + on Sundays?（毎週日曜日に）","ポイント：be動詞の文なら Are、動作の文なら Do で始める"],"answer":"あなたは毎週日曜日に野球をしますか。","mathHtml":"","answerMathHtml":""},{"id":"en-06","subject":"英語","unit":"一般動詞","no":"No.6","question":"I don’t have any pets.","hint":"「1匹も〜ない」。not と any の組み合わせ。","approach":"一般動詞の否定文は、動詞の前に don’t を置きます。any は、否定文の中では「1つも／1匹も（〜ない）」という意味になります。","steps":["公式：I don’t + 動詞（元の形）+ any + 複数形","この文：I don’t have + any pets","ポイント：any の後ろの名詞は pets と複数形にする"],"answer":"私はペットを飼っていません。","mathHtml":"","answerMathHtml":""},{"id":"en-07","subject":"英語","unit":"一般動詞","no":"No.7","question":"Zach practices basketball every day.","hint":"主語がZach（1人）。現在の文で動詞の最後に付くものは？","approach":"主語が he / she や、1人の人の名前のとき、現在の文では動詞の最後に s（es）を付けます。practice は practices になります。","steps":["公式：主語（1人・1つ）+ 動詞s ...","この文：Zach + practices basketball + every day","ポイント：I・you・複数の主語のときは s を付けない"],"answer":"ザックは毎日バスケットボールを練習します。","mathHtml":"","answerMathHtml":""},{"id":"en-08","subject":"英語","unit":"一般動詞","no":"No.8","question":"Naoki doesn’t walk his dog.","hint":"doesn’tの後ろの動詞は、どんな形？","approach":"主語が1人（Naoki）の否定文は doesn’t を使います。s の仕事は doesn’t が引き受けるので、後ろの動詞は walks ではなく walk（元の形）に戻します。","steps":["公式：主語（1人）+ doesn’t + 動詞（元の形）","この文：Naoki + doesn’t walk + his dog","ポイント：doesn’t walks と s を二重に付けない"],"answer":"ナオキは彼の犬を散歩させません。","mathHtml":"","answerMathHtml":""},{"id":"en-09","subject":"英語","unit":"疑問詞","no":"No.9","question":"What do you do after school?","hint":"「何を」とたずねる単語＋ふつうの疑問文の順番。","approach":"「何を」とたずねる What を文の先頭に置き、その後ろは do you do と、ふつうの疑問文の並びを続けます。2つ目の do は「する」という動作の言葉です。","steps":["公式：What + do you + 動詞 ...?","この文：What do you do + after school?（放課後）","ポイント：最初の do は疑問文の目印、後ろの do は「する」"],"answer":"あなたは放課後何をしますか。","mathHtml":"","answerMathHtml":""},{"id":"en-10","subject":"英語","unit":"疑問詞","no":"No.10","question":"Whose bag is this? - It’s mine.","hint":"「だれの？」とたずねる単語。mineは1語でどんな意味？","approach":"「だれのバッグ？」は Whose bag ...? とたずねます。答えの mine は「私のもの」という意味で、mine 1語で my bag の代わりになります。","steps":["公式：Whose + もの + is this? — It’s mine.","この文：Whose bag is this? → It’s mine.（私のものです）","ポイント：mine の後ろに bag を重ねて言わない"],"answer":"これはだれのバッグですか。- 私のものです。","mathHtml":"","answerMathHtml":""},{"id":"en-11","subject":"英語","unit":"疑問詞","no":"No.11","question":"What is this? - It’s a watch.","hint":"「これは何？」の決まり文句。答えの a にも注目。","approach":"目の前の物をたずねる決まり文句が What is this? です。答えるときは this を it で受けて、1つの物なら a を付けて It’s a watch. と言います。","steps":["公式：What is this? — It is a + もの.","この文：What is this? → It’s a watch.","ポイント：答えの文では this をくり返さず it にする"],"answer":"これは何ですか。- それは時計です。","mathHtml":"","answerMathHtml":""},{"id":"en-12","subject":"英語","unit":"疑問詞","no":"No.12","question":"Who is that? - She is Ms. Kinjo.","hint":"「あの人はだれ？」。人をたずねる単語は？","approach":"人が「だれか」をたずねるときは Who を使います。答えの Ms. は女性に付ける呼び方で、男性なら Mr. です。","steps":["公式：Who is that? — He/She is 〜.","この文：Who is that? → She is Ms. Kinjo.","ポイント：Mr.＝男性、Ms.＝女性。She の文なら Ms."],"answer":"あの人はだれですか。- 彼女は金城さんです。","caution":"配布プリントは “She is Mr. Kinjo.” ですが、She と日本語訳に合わせると “Ms. Kinjo” が適切です。","mathHtml":"","answerMathHtml":""},{"id":"en-13","subject":"英語","unit":"疑問詞","no":"No.13","question":"Which ice cream do you like, mint or vanilla?","hint":"「AとBのどちら？」の型。","approach":"決まった選択肢から「どちら？」と選ばせるときは Which を使います。文の最後に , A or B? と選択肢を並べます。","steps":["公式：Which ... do you like, A or B?","この文：Which ice cream do you like, mint or vanilla?","ポイント：自由に聞くなら What、選択肢から選ばせるなら Which"],"answer":"ミントかバニラのどちらのアイスが好きですか。","mathHtml":"","answerMathHtml":""},{"id":"en-14","subject":"英語","unit":"過去形","no":"No.14","question":"I went to Hokkaido last year.","hint":"last year がある。go はどう変化する？","approach":"last year（去年）があるので過去の文です。go の過去形は goed ではなく、形がガラッと変わって went になります。","steps":["公式：go → went(過去形)","この文：I went to Hokkaido + last year","ポイント：went のように形が変わる動詞は、そのまま覚える"],"answer":"私は去年北海道に行きました。","mathHtml":"","answerMathHtml":""},{"id":"en-15","subject":"英語","unit":"過去形","no":"No.15","question":"We enjoyed singing.","hint":"enjoy の後ろに動作を続けるときの形は？","approach":"enjoyed は enjoy（楽しむ）の過去形です。enjoy の後ろに動作を続けるときは、必ず 〜ing の形（「〜すること」）にします。to sing にはしません。","steps":["公式：enjoy + 動詞のing形","この文：We enjoyed + singing（歌うことを）","ポイント：enjoy to 〜 の形はまちがい"],"answer":"私たちは歌うことを楽しみました。","mathHtml":"","answerMathHtml":""},{"id":"en-16","subject":"英語","unit":"過去形","no":"No.16","question":"Did you read the manga yesterday?","hint":"過去の疑問文の先頭は？read の読み方にも注意。","approach":"過去のことをたずねるときは、文の先頭に Did を置き、動詞は read（元の形）にします。read は過去形もつづりが同じで、読み方だけ「レッド」に変わります。","steps":["公式：Did you + 動詞（元の形）...?","この文：Did you read the manga + yesterday?","ポイント：疑問文の read は「リード」。「読んだ」の read は「レッド」"],"answer":"あなたは昨日そのマンガを読みましたか。","mathHtml":"","answerMathHtml":""},{"id":"en-17","subject":"英語","unit":"過去形","no":"No.17","question":"Mai didn’t have a cat.","hint":"didn’t の後ろの動詞は、どんな形？","approach":"過去の否定文は、動詞の前に didn’t を置きます。過去の目印は didn’t が引き受けるので、動詞は had ではなく have（元の形）に戻します。","steps":["公式：didn’t + 動詞（元の形）","この文：Mai didn’t have + a cat","ポイント：didn’t had と過去を二重にしない"],"answer":"マイは猫を飼っていませんでした。","mathHtml":"","answerMathHtml":""},{"id":"en-18","subject":"英語","unit":"過去形","no":"No.18","question":"I was a volleyball fan.","hint":"am / is の過去形は？","approach":"「〜でした」と過去を表すときは、am と is が was に変わります。主語が I なので was を使います。","steps":["公式：am / is → was","この文：I was + a volleyball fan","ポイント：今の話なら I am、過去の話なら I was"],"answer":"私はバレーボールファンでした。","mathHtml":"","answerMathHtml":""},{"id":"en-19","subject":"英語","unit":"過去形","no":"No.19","question":"They were in a handball club.","hint":"are の過去形は？","approach":"are の過去形は were です。主語の They は複数なので were を使います。be in 〜 は「〜に入っている・いる」という意味です。","steps":["公式：are → were","この文：They were + in a handball club（ハンドボール部に）","ポイント：was は am / is の過去、were は are の過去"],"answer":"彼らはハンドボール部にいました。","mathHtml":"","answerMathHtml":""},{"id":"en-20","subject":"英語","unit":"進行形","no":"No.20","question":"Mr. Sato is reading a newspaper now.","hint":"now がある。「今〜している最中」の形は？","approach":"now（今）があり、「ちょうど今している最中」を表すので、is + reading の形（現在進行形）を使います。reads なら「ふだん読む習慣がある」という意味になってしまいます。","steps":["公式：am / is / are + 動詞のing形（今〜しているところ）","この文：Mr. Sato is reading + a newspaper + now","ポイント：reads＝ふだん読む、is reading＝今読んでいる最中"],"answer":"佐藤さんは今新聞を読んでいます。","mathHtml":"","answerMathHtml":""},{"id":"en-21","subject":"英語","unit":"進行形","no":"No.21","question":"My brothers are swimming now.","hint":"swim を ing形にするときのつづりに注意。","approach":"主語の My brothers は複数なので are を使います。swim は最後の m を重ねて swimming とつづります。","steps":["公式：複数の主語 + are + 動詞のing形","この文：My brothers are swimming + now","ポイント：run→running、swim→swimming（最後の1文字を重ねる仲間）"],"answer":"私の弟たちは今泳いでいる最中です。","mathHtml":"","answerMathHtml":""},{"id":"en-22","subject":"英語","unit":"進行形","no":"No.22","question":"We were singing in the room then.","hint":"then（その時）＋過去。「〜していました」の形は？","approach":"then は「その時」。過去のある時点で動作の最中だったことを表すので、were + singing の形（過去進行形）を使います。","steps":["公式：was / were + 動詞のing形（〜していました）","この文：We were singing + in the room + then","ポイント：is/are + ing＝今している、was/were + ing＝その時していた"],"answer":"私たちはその時部屋で歌っていました。","mathHtml":"","answerMathHtml":""},{"id":"en-23","subject":"英語","unit":"can","no":"No.23","question":"Sakura can play shogi very well.","hint":"can の後ろの動詞は、どんな形？","approach":"can（〜できる）の後ろの動詞は、主語がだれでも必ず元の形です。Sakura が主語でも plays にはなりません。well は「上手に」と、プレーのしかたを説明します。","steps":["公式：can + 動詞（元の形）","この文：Sakura can play + shogi + very well（とても上手に）","ポイント：can plays はまちがい。can の後ろに s は付けない"],"answer":"サクラは将棋がとても上手にできます。","mathHtml":"","answerMathHtml":""},{"id":"en-24","subject":"英語","unit":"can","no":"No.24","question":"Can Judy play the guitar? - Yes, she can.","hint":"can の疑問文と答え方。","approach":"can の疑問文は、Can を主語の前に出します。Can でたずねられたら、答えの文でも can を使って Yes, she can. と返します。","steps":["公式：Can + 主語 + 動詞（元の形）...? — Yes, 主語 + can.","この文：Can Judy play the guitar? → Yes, she can.","ポイント：Judy は女性なので、答えでは she に言いかえる"],"answer":"ジュディーはギターが弾けますか。- はい、弾けます。","mathHtml":"","answerMathHtml":""},{"id":"en-25","subject":"英語","unit":"can","no":"No.25","question":"I can’t make pizza.","hint":"can の否定形。2つの書き方が言える？","approach":"「〜できない」は cannot、短くすると can’t です。後ろの動詞 make は、そのまま元の形にします。","steps":["公式：cannot（can’t）+ 動詞（元の形）","この文：I can’t make + pizza","ポイント：can not と2語に分けず、cannot と1語で書くのが基本"],"answer":"私はピザが作れません。","mathHtml":"","answerMathHtml":""},{"id":"en-26","subject":"英語","unit":"未来","no":"No.26","question":"It will be rainy tomorrow.","hint":"will の後ろで、be動詞はどんな形になる？","approach":"will（〜でしょう）の後ろの動詞は元の形です。is の元の形は be なので、will be となります。rainy は「雨降りの」と天気の様子を表す言葉です。","steps":["公式：will + be + 様子を表す言葉","この文：It will be rainy + tomorrow","ポイント：天気の文の主語は It。will is とは言わない"],"answer":"明日は雨になるでしょう。","mathHtml":"","answerMathHtml":""},{"id":"en-27","subject":"英語","unit":"未来","no":"No.27","question":"The festival will start at three o’clock.","hint":"未来の文の形と、時刻の前に付く単語。","approach":"未来のことは will + 元の形で表します。start はそのままの形です。「3時に」のように時刻を言うときは、前に at を付けます。","steps":["公式：will + 動詞（元の形）／ at + 時刻","この文：The festival will start + at three o’clock","ポイント：will の後ろは、主語が何でも動詞はそのまま"],"answer":"その祭りは3時に始まる予定です。","mathHtml":"","answerMathHtml":""},{"id":"en-28","subject":"英語","unit":"未来","no":"No.28","question":"I am going to see Mr. Kinjo this afternoon.","hint":"「〜するつもり」。be going to の形。","approach":"決めてある予定は be going to + 元の形で表します。主語が I なので be動詞は am、see はそのままの形です。","steps":["公式：主語 + be going to + 動詞（元の形）","この文：I am going to see + Mr. Kinjo + this afternoon（今日の午後）","ポイント：be の部分は主語で変わる（I am / He is / They are）"],"answer":"私は今日の午後金城さんに会う予定です。","mathHtml":"","answerMathHtml":""},{"id":"en-29","subject":"英語","unit":"未来","no":"No.29","question":"Are you going to make a cake? - No, I’m not.","hint":"be going to の疑問文。前に出すのはどれ？","approach":"be going to の疑問文は、be動詞（are）だけを主語の前に出します。答えるときも be動詞を使って No, I’m not. と返します。","steps":["公式：Are you going to + 動詞（元の形）...? — No, I’m not.","この文：Are you going to make a cake? → No, I’m not.","ポイント：Do you going to とはしない。前に出すのは be動詞"],"answer":"あなたはケーキを作るつもりですか。- いいえ、違います。","mathHtml":"","answerMathHtml":""},{"id":"en-30","subject":"英語","unit":"未来","no":"No.30","question":"I am not going to get up at five in the morning.","hint":"be going to の否定。not の位置は？","approach":"be going to の否定文は、be動詞のすぐ後ろに not を入れます。get up は「起きる」、at five は「5時に」です。","steps":["公式：主語 + be動詞 + not + going to + 動詞（元の形）","この文：I am not going to get up + at five in the morning","ポイント：not の位置は am のすぐ後ろ"],"answer":"私は朝5時に起きるつもりはありません。","caution":"配布プリントの日本語訳には「明日」がありますが、英文には tomorrow がありません。英文だけなら「朝5時に起きるつもりはありません」です。","mathHtml":"","answerMathHtml":""},{"id":"en-31","subject":"英語","unit":"be動詞","no":"No.31","question":"I am not good at soccer.","hint":"「得意ではない」。not はどこに入れる？","approach":"「〜が得意です」の be good at を否定にするには、be動詞の後ろに not を入れるだけです。good at のかたまりは、そのまま使います。","steps":["公式：主語 + be動詞 + not + good at 〜","この文：I am not good at + soccer","ポイント：肯定文 I am good at 〜 に not を足すだけ"],"answer":"私はサッカーが上手ではありません。","mathHtml":"","answerMathHtml":""},{"id":"en-32","subject":"英語","unit":"be動詞","no":"No.32","question":"Are you in the dance club?","hint":"「部に入っている」の言い方。","approach":"be in 〜 で「〜に入っている・所属している」を表せます。be動詞の文なので、たずねるときは Are を先頭に出します。","steps":["公式：Are you in + 部・グループ?","この文：Are you in + the dance club?","ポイント：「入る」という動作の言葉を使わなくても、be in で言える"],"answer":"あなたはダンス部に入っていますか。","mathHtml":"","answerMathHtml":""},{"id":"en-33","subject":"英語","unit":"be動詞","no":"No.33","question":"They are from Korea.","hint":"「〜出身」の言い方。","approach":"be from 〜 で「〜出身です」を表します。Korea のような国や地名は、文のどこにあっても大文字で書き始めます。","steps":["公式：主語 + be動詞 + from + 場所","この文：They are from + Korea","ポイント：国名・地名・人名は大文字スタート"],"answer":"彼らは韓国出身です。","mathHtml":"","answerMathHtml":""},{"id":"en-34","subject":"英語","unit":"be動詞","no":"No.34","question":"Is that your dog? - Yes, it is.","hint":"「あれは〜？」の答え方。that を何で受ける？","approach":"Is that ...? とたずねられたら、答えの文では that を it に言いかえて Yes, it is. と返します。同じ that をくり返しません。","steps":["公式：Is that ...? — Yes, it is. / No, it isn’t.","この文：Is that your dog? → Yes, it is.","ポイント：Yes, that is. とは答えない"],"answer":"あれはあなたの犬ですか。- はい、そうです。","mathHtml":"","answerMathHtml":""},{"id":"en-35","subject":"英語","unit":"be動詞","no":"No.35","question":"This is a famous chocolate ice cream.","hint":"名前の前に、説明の言葉を重ねる並び方。","approach":"famous（有名な）と chocolate（チョコの）が、後ろの ice cream を説明しています。英語では、説明する言葉を名前の前に並べます。","steps":["公式：a + 説明の言葉 + もの","この文：a + famous chocolate + ice cream","ポイント：日本語と同じ「有名な チョコ アイス」の順番"],"answer":"これは有名なチョコアイスです。","caution":"ice cream は通常は数えない名詞ですが、商品・1種類・1個分として扱う文では a が付くことがあります。テストでは配布文をそのまま覚えます。","mathHtml":"","answerMathHtml":""},{"id":"en-36","subject":"英語","unit":"一般動詞","no":"No.36","question":"Do you cook breakfast?","hint":"cook は動作の言葉。疑問文の先頭は？","approach":"cook（料理する）のような動作の言葉の疑問文は、Do を先頭に置きます。cook は、そのまま元の形です。","steps":["公式：Do you + 動詞（元の形）...?","この文：Do you cook + breakfast?","ポイント：Are you cook ...? としない。動作の文は Do"],"answer":"あなたは朝食を作りますか。","mathHtml":"","answerMathHtml":""},{"id":"en-37","subject":"英語","unit":"一般動詞","no":"No.37","question":"I usually go to the library on Fridays.","hint":"usually（たいてい）を置く場所は？","approach":"usually（たいてい）は、go のような動作の言葉の前に置きます。on Fridays と s が付くと「毎週金曜日に」の意味です。","steps":["公式：主語 + usually + 動詞 ...","この文：I usually go + to the library + on Fridays","ポイント：always / usually / sometimes は動詞の前に置く"],"answer":"私はたいてい毎週金曜日に図書館へ行きます。","mathHtml":"","answerMathHtml":""},{"id":"en-38","subject":"英語","unit":"一般動詞","no":"No.38","question":"Yumi runs very fast.","hint":"主語は Yumi 1人。動詞の形は？very は何を強める？","approach":"主語が Yumi（1人）なので、run に s を付けて runs にします。fast は「速く」、very fast で「とても速く」と強まります。","steps":["公式：主語（1人）+ 動詞s ／ very + fast","この文：Yumi runs + very fast","ポイント：runs の s を忘れやすいので注意"],"answer":"ユミはとても速く走ります。","mathHtml":"","answerMathHtml":""},{"id":"en-39","subject":"英語","unit":"一般動詞","no":"No.39","question":"Does your brother speak French?","hint":"主語が your brother（1人）。疑問文の先頭は？","approach":"主語が your brother（1人）の疑問文は、Do ではなく Does を使います。s の仕事は Does がするので、動詞は speaks ではなく speak に戻します。","steps":["公式：Does + 主語（1人）+ 動詞（元の形）...?","この文：Does your brother speak + French?","ポイント：Does ... speaks と s を二重にしない"],"answer":"あなたのお兄さんはフランス語を話しますか。","mathHtml":"","answerMathHtml":""},{"id":"en-40","subject":"英語","unit":"一般動詞","no":"No.40","question":"Yuki bought a new bag on Sunday.","hint":"on Sunday は過去の1日。buy はどう変わる？","approach":"この文の on Sunday は「（この前の）日曜日に」と過去の1日を指し、buy は過去形の bought に変わります。went と同じく、形がガラッと変わる仲間です。","steps":["公式：buy → bought(過去形)","この文：Yuki bought + a new bag + on Sunday","ポイント：buyed はまちがい。bought とつづりごと覚える"],"answer":"ユキは日曜日に新しいバッグを買いました。","mathHtml":"","answerMathHtml":""},{"id":"en-41","subject":"英語","unit":"一般動詞","no":"No.41","question":"Did Jim talk with you last night?","hint":"last night ＋疑問文。動詞の形は？","approach":"last night（昨夜）がある過去の疑問文なので、Did を先頭に置きます。動詞は talked ではなく talk（元の形）です。talk with 〜 は「〜と話す」。","steps":["公式：Did + 主語 + 動詞（元の形）...?","この文：Did Jim talk + with you + last night?","ポイント：Did ... talked と過去を二重にしない"],"answer":"ジムは昨夜あなたと話しましたか。","mathHtml":"","answerMathHtml":""},{"id":"en-42","subject":"英語","unit":"一般動詞","no":"No.42","question":"She didn’t go to the library after school.","hint":"didn’t の後ろ。go と went のどっち？","approach":"didn’t が過去を表しているので、後ろの動詞は went ではなく go（元の形）に戻します。after school は「放課後」です。","steps":["公式：didn’t + 動詞（元の形）","この文：She didn’t go + to the library + after school","ポイント：didn’t went はまちがい"],"answer":"彼女は放課後図書館に行きませんでした。","mathHtml":"","answerMathHtml":""},{"id":"en-43","subject":"英語","unit":"疑問詞","no":"No.43","question":"What animals do you like?","hint":"「どんな動物？」。動物の言葉の形にも注目。","approach":"「どんな〜／何の〜」と広くたずねるときは、What + たずねたい物の言葉で始めます。答えはいろいろありえるので、animals と複数形にします。","steps":["公式：What + 複数形 + do you like?","この文：What animals + do you like?","ポイント：後ろは do you like と、ふつうの疑問文の並び"],"answer":"何の動物が好きですか。","mathHtml":"","answerMathHtml":""},{"id":"en-44","subject":"英語","unit":"疑問詞","no":"No.44","question":"How many cats did you see?","hint":"数をたずねる言い方。後ろの言葉の形は？","approach":"数をたずねるときは How many で始め、すぐ後ろに cats と複数形を置きます。過去の疑問文なので did、動詞は see（元の形）です。","steps":["公式：How many + 複数形 + did you + 動詞（元の形）?","この文：How many cats + did you see?","ポイント：How many cat と単数にしない"],"answer":"何匹の猫を見ましたか。","mathHtml":"","answerMathHtml":""},{"id":"en-45","subject":"英語","unit":"疑問詞","no":"No.45","question":"When is your birthday?","hint":"「いつ？」とたずねる単語は？","approach":"「いつ」と時をたずねるときは When で始めます。後ろは is your birthday と、be動詞の疑問文の並びを続けます。","steps":["公式：When is + 主語?","この文：When is + your birthday?","ポイント：場所なら Where、時なら When"],"answer":"あなたの誕生日はいつですか。","mathHtml":"","answerMathHtml":""},{"id":"en-46","subject":"英語","unit":"疑問詞","no":"No.46","question":"Who is your favorite character?","hint":"「だれ？」とたずねる単語は？","approach":"「だれですか」と人をたずねるときは Who で始めます。favorite は「一番のお気に入りの」という意味で、character の前に置いて説明します。","steps":["公式：Who is + your favorite + もの?","この文：Who is your favorite character?","ポイント：答えが人（キャラクター）なので、What ではなく Who"],"answer":"あなたのお気に入りのキャラクターはだれですか。","mathHtml":"","answerMathHtml":""},{"id":"en-47","subject":"英語","unit":"疑問詞","no":"No.47","question":"Which do you want, a cat or a dog?","hint":"「どちらが欲しい？」。選択肢の並べ方。","approach":"2つから選ばせる質問なので Which で始めます。文の最後に , a cat or a dog? と選択肢を並べます。","steps":["公式：Which do you want, A or B?","この文：Which do you want, a cat or a dog?","ポイント：cat と dog のそれぞれに a を付ける"],"answer":"猫と犬、どちらが欲しいですか。","mathHtml":"","answerMathHtml":""},{"id":"en-48","subject":"英語","unit":"進行形","no":"No.48","question":"Ryo is watching a movie on TV.","hint":"is watching の意味。「テレビで」は？","approach":"is watching は「今見ているところ」という意味の形です。watch a movie で「映画を見る」、on TV で「テレビで」を表します。","steps":["公式：is + 動詞のing形 ／ on TV","この文：Ryo is watching + a movie + on TV","ポイント：watches なら習慣、is watching なら今の最中"],"answer":"リョウはテレビで映画を見ているところです。","mathHtml":"","answerMathHtml":""},{"id":"en-49","subject":"英語","unit":"進行形","no":"No.49","question":"I was practicing tennis then.","hint":"then ＋ ing形。いつの話？","approach":"then（その時）とあるので、過去のある時点でしていた動作です。主語が I なので was を使い、was practicing で「練習していました」となります。","steps":["公式：was + 動詞のing形","この文：I was practicing + tennis + then","ポイント：I なので were ではなく was"],"answer":"私はその時テニスをしていました。","mathHtml":"","answerMathHtml":""},{"id":"en-50","subject":"英語","unit":"進行形","no":"No.50","question":"Ken was taking a bath then.","hint":"「お風呂に入る」の言い方。","approach":"take a bath は「お風呂に入る」というひとまとまりの言い方です。過去のその時にしていたので、was taking の形にします。","steps":["公式：was + 動詞のing形 ／ take a bath","この文：Ken was taking a bath + then","ポイント：take → taking（e をとって ing）"],"answer":"ケンはその時入浴していました。","mathHtml":"","answerMathHtml":""},{"id":"en-51","subject":"英語","unit":"look","no":"No.51","question":"Tom looks happy.","hint":"look の後ろに置く言葉の種類は？","approach":"look の後ろに happy のような様子を表す言葉を置くと、「〜そうに見える」という意味になります。「うれしそうに」と考えて happily にはしません。","steps":["公式：look(s) + 様子を表す言葉（happy, sad など）","この文：Tom looks + happy","ポイント：主語が Tom（1人）なので looks と s が付く"],"answer":"トムはうれしそうに見えます。","mathHtml":"","answerMathHtml":""},{"id":"en-52","subject":"英語","unit":"look","no":"No.52","question":"Your mother looked sad yesterday.","hint":"yesterday がある。look はどう変わる？","approach":"yesterday（昨日）があるので、look は過去形の looked にします。後ろは sad（悲しい）という様子の言葉を、そのまま置きます。","steps":["公式：looked + 様子を表す言葉","この文：Your mother looked sad + yesterday","ポイント：「悲しそうに見えた」＝ looked sad の2語で言える"],"answer":"あなたのお母さんは昨日悲しそうに見えました。","mathHtml":"","answerMathHtml":""},{"id":"en-53","subject":"英語","unit":"can","no":"No.53","question":"I cannot write a letter in English.","hint":"cannot の書き方と、「英語で」の言い方。","approach":"「〜できません」は cannot と1語で書くのが基本です（短くすると can’t）。in English は「英語で」という意味です。","steps":["公式：cannot + 動詞（元の形）／ in + 言語","この文：I cannot write a letter + in English","ポイント：can not と離して書かない"],"answer":"私は英語で手紙を書くことができません。","mathHtml":"","answerMathHtml":""},{"id":"en-54","subject":"英語","unit":"can","no":"No.54","question":"Mika can draw pictures well.","hint":"can の後ろの形と、well の意味。","approach":"can の後ろの動詞は、主語が Mika（1人）でも draws にせず draw のままです。well は「上手に」と、描き方を説明しています。","steps":["公式：can + 動詞（元の形）+ well","この文：Mika can draw pictures + well","ポイント：draw pictures well の語順のまま覚える"],"answer":"ミカは上手に絵を描くことができます。","mathHtml":"","answerMathHtml":""},{"id":"en-55","subject":"英語","unit":"未来","no":"No.55","question":"Ken will not buy the T-shirt.","hint":"will の否定形。短縮形も言える？","approach":"will の否定は will not、短縮形は won’t です。後ろの動詞 buy は、そのまま元の形にします。","steps":["公式：will not（won’t）+ 動詞（元の形）","この文：Ken will not buy + the T-shirt","ポイント：won’t は「ウォウント」。want と混同しない"],"answer":"ケンはそのTシャツを買わないでしょう。","mathHtml":"","answerMathHtml":""},{"id":"en-56","subject":"英語","unit":"未来","no":"No.56","question":"Jim is going to take pictures of Mt. Fuji.","hint":"「〜の写真を撮る」の言い方。","approach":"is going to + 元の形で「〜するつもりです」。take pictures of 〜 で「〜の写真を撮る」というまとまりです。","steps":["公式：be going to + 動詞（元の形）／ take pictures of 〜","この文：Jim is going to take pictures + of Mt. Fuji","ポイント：主語が Jim（1人）なので be動詞は is"],"answer":"ジムは富士山の写真を撮るつもりです。","mathHtml":"","answerMathHtml":""},{"id":"en-57","subject":"英語","unit":"接続詞・that","no":"No.57","question":"When I was a child, I loved picture books.","hint":"この When は質問ではない。どんな働き？","approach":"この When は「いつ？」の質問ではなく、「〜のとき」と2つの文をつなぐ働きです。子どものころの話なので、was と loved の両方を過去形にします。","steps":["公式：When + 文A（〜のとき）, 文B.","この文：When I was a child,（子どものとき）+ I loved picture books.","ポイント：質問の When（いつ？）とは働きがちがう"],"answer":"私が子どもの時、絵本が好きでした。","mathHtml":"","answerMathHtml":""},{"id":"en-58","subject":"英語","unit":"接続詞・that","no":"No.58","question":"If it is sunny, I will go to Tokyo with my sister.","hint":"if のかたまりの中の動詞の形に注目。","approach":"If 〜 は「もし〜なら」。明日の話でも、if のかたまりの中では will を使わず、is（現在の形）のままにするのがルールです。「〜するつもり」の will は、後ろの文で使います。","steps":["公式：If + 文（現在の形）, 主語 + will + 動詞（元の形）.","この文：If it is sunny,（もし晴れたら）+ I will go to Tokyo.","ポイント：If it will be sunny とはしない"],"answer":"もし晴れたら、私は姉と東京に行くつもりです。","mathHtml":"","answerMathHtml":""},{"id":"en-59","subject":"英語","unit":"接続詞・that","no":"No.59","question":"I think you are kind.","hint":"think の後ろに、文をつなげる形。","approach":"I think の後ろには、「主語＋動詞」の文をそのまま続けられます。本当は間に that が入りますが、よく省略されます。","steps":["公式：I think (that) + 文.","この文：I think + you are kind（あなたは親切だ）.","ポイント：that は省略されることが多い"],"answer":"あなたは親切だと私は思います。","mathHtml":"","answerMathHtml":""},{"id":"en-60","subject":"英語","unit":"接続詞・that","no":"No.60","question":"I am sure that you’ll enjoy the concert.","hint":"「きっと〜だと思う」の言い方。","approach":"be sure that 〜 で「きっと〜だと思う・確信している」という意味です。you’ll は you will を短くした形です。","steps":["公式：be sure that + 文 ／ you’ll = you will","この文：I am sure that + you’ll enjoy the concert.","ポイント：sure は「確かだ」という気持ちを表す"],"answer":"あなたはそのコンサートをきっと楽しむでしょう。","mathHtml":"","answerMathHtml":""},{"id":"ma-01-1","subject":"数学","unit":"文字式","no":"【1】(1)","question":"同類項をまとめる","hint":"同じ種類の項だけをまとめられる。x²とxは別の種類。","approach":"文字式は、同じ種類の項だけをまとめます。xの項とyの項、x²の項とxの項は別の種類です。まず種類ごとに並べ直しましょう。","steps":["xの項どうし、yの項どうしを仲間分けする。","= (4x+2x)+(7y-5y)","= (4+2)x+(7-5)y","= 6x+2y"],"answer":"6x + 2y","caution":"x²の項とxの項は別の種類です。指数まで見て仲間分けしましょう。","math":"4x+7y+2x-5y","answerMath":"6x+2y","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mn>4</mn><mi>x</mi><mo>+</mo><mn>7</mn><mi>y</mi><mo>+</mo><mn>2</mn><mi>x</mi><mo>−</mo><mn>5</mn><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">4x+7y+2x-5y</annotation></semantics></math></span>","answerMathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mn>6</mn><mi>x</mi><mo>+</mo><mn>2</mn><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">6x+2y</annotation></semantics></math></span>","stepMathHtml":["","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>4</mn><mi>x</mi><mo>+</mo><mn>2</mn><mi>x</mi><mo stretchy=\"false\">)</mo><mo>+</mo><mo stretchy=\"false\">(</mo><mn>7</mn><mi>y</mi><mo>−</mo><mn>5</mn><mi>y</mi><mo stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">= (4x+2x)+(7y-5y)</annotation></semantics></math></span>","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>4</mn><mo>+</mo><mn>2</mn><mo stretchy=\"false\">)</mo><mi>x</mi><mo>+</mo><mo stretchy=\"false\">(</mo><mn>7</mn><mo>−</mo><mn>5</mn><mo stretchy=\"false\">)</mo><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">= (4+2)x+(7-5)y</annotation></semantics></math></span>","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mn>6</mn><mi>x</mi><mo>+</mo><mn>2</mn><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">= 6x+2y</annotation></semantics></math></span>"]},{"id":"ma-01-2","subject":"数学","unit":"文字式","no":"【1】(2)","question":"同類項をまとめる","hint":"同じ種類の項だけをまとめられる。x²とxは別の種類。","approach":"文字式は、同じ種類の項だけをまとめます。xの項とyの項、x²の項とxの項は別の種類です。まず種類ごとに並べ直しましょう。","steps":["x²の項どうし、xの項どうしを仲間分けする。","= (5x^2-3x^2)+(2x-4x)","= (5-3)x^2+(2-4)x","= 2x^2-2x"],"answer":"2x² - 2x","caution":"x²の項とxの項は別の種類です。指数まで見て仲間分けしましょう。","math":"5x^2+2x-4x-3x^2","answerMath":"2x^2-2x","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mn>5</mn><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mn>2</mn><mi>x</mi><mo>−</mo><mn>4</mn><mi>x</mi><mo>−</mo><mn>3</mn><msup><mi>x</mi><mn>2</mn></msup></mrow><annotation encoding=\"application/x-tex\">5x^2+2x-4x-3x^2</annotation></semantics></math></span>","answerMathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mn>2</mn><msup><mi>x</mi><mn>2</mn></msup><mo>−</mo><mn>2</mn><mi>x</mi></mrow><annotation encoding=\"application/x-tex\">2x^2-2x</annotation></semantics></math></span>","stepMathHtml":["","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>5</mn><msup><mi>x</mi><mn>2</mn></msup><mo>−</mo><mn>3</mn><msup><mi>x</mi><mn>2</mn></msup><mo stretchy=\"false\">)</mo><mo>+</mo><mo stretchy=\"false\">(</mo><mn>2</mn><mi>x</mi><mo>−</mo><mn>4</mn><mi>x</mi><mo stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">= (5x^2-3x^2)+(2x-4x)</annotation></semantics></math></span>","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>5</mn><mo>−</mo><mn>3</mn><mo stretchy=\"false\">)</mo><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mo stretchy=\"false\">(</mo><mn>2</mn><mo>−</mo><mn>4</mn><mo stretchy=\"false\">)</mo><mi>x</mi></mrow><annotation encoding=\"application/x-tex\">= (5-3)x^2+(2-4)x</annotation></semantics></math></span>","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mn>2</mn><msup><mi>x</mi><mn>2</mn></msup><mo>−</mo><mn>2</mn><mi>x</mi></mrow><annotation encoding=\"application/x-tex\">= 2x^2-2x</annotation></semantics></math></span>"]},{"id":"ma-01-3","subject":"数学","unit":"文字式","no":"【1】(3)","question":"同類項をまとめる","hint":"同じ種類の項だけをまとめられる。x²とxは別の種類。","approach":"文字式は、同じ種類の項だけをまとめます。xの項とyの項、x²の項とxの項は別の種類です。まず種類ごとに並べ直しましょう。","steps":["abの項どうし、aの項どうしを仲間分けする。","= (4ab-ab)+(-2a+2a)","= (4-1)ab+(-2+2)a","aの項の係数が0になるので消える。","= 3ab"],"answer":"3ab","caution":"x²の項とxの項は別の種類です。指数まで見て仲間分けしましょう。","math":"4ab-2a-ab+2a","answerMath":"3ab","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mn>4</mn><mi>a</mi><mi>b</mi><mo>−</mo><mn>2</mn><mi>a</mi><mo>−</mo><mi>a</mi><mi>b</mi><mo>+</mo><mn>2</mn><mi>a</mi></mrow><annotation encoding=\"application/x-tex\">4ab-2a-ab+2a</annotation></semantics></math></span>","answerMathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mn>3</mn><mi>a</mi><mi>b</mi></mrow><annotation encoding=\"application/x-tex\">3ab</annotation></semantics></math></span>","stepMathHtml":["","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>4</mn><mi>a</mi><mi>b</mi><mo>−</mo><mi>a</mi><mi>b</mi><mo stretchy=\"false\">)</mo><mo>+</mo><mo stretchy=\"false\">(</mo><mo>−</mo><mn>2</mn><mi>a</mi><mo>+</mo><mn>2</mn><mi>a</mi><mo stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">= (4ab-ab)+(-2a+2a)</annotation></semantics></math></span>","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><mn>4</mn><mo>−</mo><mn>1</mn><mo stretchy=\"false\">)</mo><mi>a</mi><mi>b</mi><mo>+</mo><mo stretchy=\"false\">(</mo><mo>−</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo stretchy=\"false\">)</mo><mi>a</mi></mrow><annotation encoding=\"application/x-tex\">= (4-1)ab+(-2+2)a</annotation></semantics></math></span>","","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mn>3</mn><mi>a</mi><mi>b</mi></mrow><annotation encoding=\"application/x-tex\">= 3ab</annotation></semantics></math></span>"]},{"id":"ma-01-4","subject":"数学","unit":"文字式","no":"【1】(4)","question":"同類項をまとめる","hint":"同じ種類の項だけをまとめられる。x²とxは別の種類。","approach":"文字式は、同じ種類の項だけをまとめます。xの項とyの項、x²の項とxの項は別の種類です。まず種類ごとに並べ直しましょう。","steps":["a²の項、aの項、数だけの項に仲間分けする。","= (a^2-3a^2)+(-5a-a)+3","= (1-3)a^2+(-5-1)a+3","= -2a^2-6a+3"],"answer":"-2a² - 6a + 3","caution":"x²の項とxの項は別の種類です。指数まで見て仲間分けしましょう。","math":"a^2-5a-a-3a^2+3","answerMath":"-2a^2-6a+3","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><msup><mi>a</mi><mn>2</mn></msup><mo>−</mo><mn>5</mn><mi>a</mi><mo>−</mo><mi>a</mi><mo>−</mo><mn>3</mn><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><mn>3</mn></mrow><annotation encoding=\"application/x-tex\">a^2-5a-a-3a^2+3</annotation></semantics></math></span>","answerMathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>−</mo><mn>2</mn><msup><mi>a</mi><mn>2</mn></msup><mo>−</mo><mn>6</mn><mi>a</mi><mo>+</mo><mn>3</mn></mrow><annotation encoding=\"application/x-tex\">-2a^2-6a+3</annotation></semantics></math></span>","stepMathHtml":["","<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mo>=</mo><mo stretchy=\"false\">(</mo><msup><mi>a</mi><mn>2</mn></msup><mo>−</mo e\"><mrow><mn>4</mn><mi>y</mi></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"false\"><mo lspace=\"0em\" rspace=\"0em\">=</mo></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"false\"><mrow><mo>−</mo><mn>8</mn></mrow></mstyle></mtd></mtr></mtable><annotation encoding=\"application/x-tex\">\\begin{array}{rcl}-2x + 2y &amp;=&amp;-8\\\\+\\left(2x + 2y \\right)&amp;=&amp;0\\\\\\hline 4y &amp;=&amp;-8\\end{array}</annotation></semantics></math></span>"},{"title":"④ yを求める","note":"文字の前の数で、両辺を割ります。","math":"\\begin{aligned}4y&=-8\\\\y&=-2\\end{aligned}","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mtable rowspacing=\"0.25em\" columnalign=\"right left\" columnspacing=\"0em\"><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mn>4</mn><mi>y</mi></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>8</mn></mrow></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mi>y</mi></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>2</mn></mrow></mstyle></mtd></mtr></mtable><annotation encoding=\"application/x-tex\">\\begin{aligned}4y&amp;=-8\\\\y&amp;=-2\\end{aligned}</annotation></semantics></math></span>"},{"title":"⑤ xを求める","note":"求めたy=-2を①へ代入します。","math":"\\begin{aligned}-2x+2\\times(-2)&=-8\\\\-2x-4&=-8\\\\-2x&=-4\\\\x&=2\\end{aligned}","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mtable rowspacing=\"0.25em\" columnalign=\"right left\" columnspacing=\"0em\"><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mo>−</mo><mn>2</mn><mi>x</mi><mo>+</mo><mn>2</mn><mo>×</mo><mo stretchy=\"false\">(</mo><mo>−</mo><mn>2</mn><mo stretchy=\"false\">)</mo></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>8</mn></mrow></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mo>−</mo><mn>2</mn><mi>x</mi><mo>−</mo><mn>4</mn></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>8</mn></mrow></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mo>−</mo><mn>2</mn><mi>x</mi></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>4</mn></mrow></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mi>x</mi></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mn>2</mn></mrow></mstyle></mtd></mtr></mtable><annotation encoding=\"application/x-tex\">\\begin{aligned}-2x+2\\times(-2)&amp;=-8\\\\-2x-4&amp;=-8\\\\-2x&amp;=-4\\\\x&amp;=2\\end{aligned}</annotation></semantics></math></span>"},{"title":"⑥ 元の2本の式で確かめる","note":"両方とも左辺と右辺が同じになれば正解です。","math":"\\begin{aligned}-2\\times2 + 2\\times(-2)&=-8\\\\2\\times2 + 2\\times(-2)&=0\\end{aligned}","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mtable rowspacing=\"0.25em\" columnalign=\"right left\" columnspacing=\"0em\"><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mo>−</mo><mn>2</mn><mo>×</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo>×</mo><mo stretchy=\"false\">(</mo><mo>−</mo><mn>2</mn><mo stretchy=\"false\">)</mo></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mo>−</mo><mn>8</mn></mrow></mstyle></mtd></mtr><mtr><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mn>2</mn><mo>×</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo>×</mo><mo stretchy=\"false\">(</mo><mo>−</mo><mn>2</mn><mo stretchy=\"false\">)</mo></mrow></mstyle></mtd><mtd><mstyle scriptlevel=\"0\" displaystyle=\"true\"><mrow><mrow></mrow><mo>=</mo><mn>0</mn></mrow></mstyle></mtd></mtr></mtable><annotation encoding=\"application/x-tex\">\\begin{aligned}-2\\times2 + 2\\times(-2)&amp;=-8\\\\2\\times2 + 2\\times(-2)&amp;=0\\end{aligned}</annotation></semantics></math></span>"}],"answer":"x = 2、y = -2","caution":"形を直す途中で、右辺の数やマイナスを落とさないように、一行ずつ書きましょう。","answerMath":"x=2,\\ y=-2","mathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>x</mi><mo>+</mo><mi>y</mi><mo>+</mo><mn>8</mn><mo>=</mo><mn>5</mn><mi>x</mi><mo>+</mo><mi>y</mi><mo>=</mo><mn>3</mn><mi>x</mi><mo>−</mo><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">x + y + 8 = 5x + y = 3x - y</annotation></semantics></math></span>","answerMathHtml":"<span class=\"katex\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><semantics><mrow><mi>x</mi><mo>=</mo><mn>2</mn><mo separator=\"true\">,</mo><mtext> </mtext><mi>y</mi><mo>=</mo><mo>−</mo><mn>2</mn></mrow><annotation encoding=\"application/x-tex\">x=2,\\ y=-2</annotation></semantics></math></span>"},{"id":"ma-29-1","subject":"数学","unit":"連立方程式の文章題","no":"【29】","question":"ボールペンとノートの値段\n\nボールペン5本とノート4冊の代金の合計は890円です。また、ボールペン6本とノート3冊の代金の合計は870円です。ボールペン1本とノート1冊の値段は、それぞれ何円ですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["ボールペン1本をx円、ノート1冊をy円とする。","5x + 4y = 890 ……①","6x + 3y = 870 ……②","①×3：15x + 12y = 2670、②×4：24x + 12y = 3480","差をとると 9x = 810 → x = 90","①へ代入：450 + 4y = 890 → 4y = 440 → y = 110"],"answer":"ボールペン1本 90円、ノート1冊 110円","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","","",""]},{"id":"ma-30-1","subject":"数学","unit":"連立方程式の文章題","no":"【30】","question":"歩いた道のりと走った道のり\n\nAさんは10時に家を出発し、1200m離れた駅へ向かいました。はじめは分速50mで歩き、途中から分速80mで走ったところ、10時18分に着きました。歩いた道のりと走った道のりは、それぞれ何mですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["歩いた時間をx分、走った時間をy分とする。","時間の合計は18分：x + y = 18 ……①","道のりの合計は1200m：50x + 80y = 1200 ……②","①×50：50x + 50y = 900。②から引くと 30y = 300 → y = 10","①より x = 18 - 10 = 8","歩いた道のり：50×8 = 400m、走った道のり：80×10 = 800m"],"answer":"歩いた道のり 400m、走った道のり 800m","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","","",""]},{"id":"ma-31-1","subject":"数学","unit":"連立方程式の文章題","no":"【31】","question":"高速道路とふつうの道路\n\n目的地まで、高速道路を時速80km、ふつうの道路を時速40kmで走り、全体で3時間かかりました。道のりの合計が200kmのとき、高速道路とふつうの道路はそれぞれ何kmですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["高速道路の道のりをx km、ふつうの道路をy kmとする。","道のり：x + y = 200 ……①","時間：x/80 + y/40 = 3 ……②","②×80：x + 2y = 240","この式から①を引くと y = 40。①より x = 160"],"answer":"高速道路 160km、ふつうの道路 40km","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"ma-32-1","subject":"数学","unit":"連立方程式の文章題","no":"【32】","question":"割引された弁当とお茶\n\n特売日に弁当とお茶を1つずつ買いました。弁当は定価の10％引き、お茶は20％引きでした。合計は528円で、定価で買うより72円安くなりました。弁当とお茶の定価は、それぞれ何円ですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["弁当の定価をx円、お茶の定価をy円とする。","定価の合計は 528 + 72 = 600円：x + y = 600 ……①","売価の合計：0.9x + 0.8y = 528 ……②","②×10：9x + 8y = 5280、①×8：8x + 8y = 4800","差をとると x = 480。①より y = 120"],"answer":"弁当の定価 480円、お茶の定価 120円","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"ma-33-1","subject":"数学","unit":"連立方程式の文章題","no":"【33】","question":"500円硬貨と100円硬貨の貯金\n\n毎日、500円硬貨か100円硬貨のどちらか1枚を貯金箱に入れます。4週間でちょうど10000円ためるには、500円硬貨と100円硬貨をそれぞれ何日入れればよいですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["500円硬貨を入れる日数をx日、100円硬貨をy日とする。","4週間＝28日：x + y = 28 ……①","金額の合計：500x + 100y = 10000 ……②","②÷100：5x + y = 100","この式から①を引くと 4x = 72 → x = 18。①より y = 10"],"answer":"500円硬貨を18日、100円硬貨を10日","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"ma-34-1","subject":"数学","unit":"連立方程式の文章題","no":"【34】","question":"博物館の入館料\n\nある博物館の大人1人の入館料は、中学生1人より150円高いそうです。大人4人と中学生6人の合計が2500円のとき、それぞれ1人分の入館料を求めなさい。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["大人1人の入館料をx円、中学生1人をy円とする。","大人は150円高い：x = y + 150 ……①","入館料の合計：4x + 6y = 2500 ……②","①を②へ代入：4(y + 150) + 6y = 2500","4y + 600 + 6y = 2500 → 10y = 1900 → y = 190","①より x = 190 + 150 = 340"],"answer":"大人1人 340円、中学生1人 190円","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","","",""]},{"id":"ma-35-1","subject":"数学","unit":"連立方程式の文章題","no":"【35】","question":"パンとドーナツの値段\n\nパン7個とドーナツ3個の代金は990円、パン4個とドーナツ6個の代金は1080円です。パン1個とドーナツ1個の値段は、それぞれ何円ですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["パン1個をx円、ドーナツ1個をy円とする。","7x + 3y = 990 ……①","4x + 6y = 1080 ……②","①×2：14x + 6y = 1980。②を引くと 10x = 900 → x = 90","①へ代入：630 + 3y = 990 → 3y = 360 → y = 120"],"answer":"パン1個 90円、ドーナツ1個 120円","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"ma-36-1","subject":"数学","unit":"連立方程式の文章題","no":"【36】","question":"歩いた道のりと走った道のり\n\nAさんは家から1350m離れた学校へ向かいました。はじめは分速60mで歩き、途中から分速150mで走ると、全部で18分かかりました。歩いた道のりと走った道のりは、それぞれ何mですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["歩いた道のりをx m、走った道のりをy mとする。","道のり：x + y = 1350 ……①","時間：x/60 + y/150 = 18 ……②","②×300：5x + 2y = 5400","①×2：2x + 2y = 2700。差をとると 3x = 2700 → x = 900","①より y = 1350 - 900 = 450"],"answer":"歩いた道のり 900m、走った道のり 450m","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","","",""]},{"id":"ma-37-1","subject":"数学","unit":"連立方程式の文章題","no":"【37】(1)","question":"割合を使う連立方程式\n\n商品Aは定価の20％引き、商品Bは定価の25％引きでした。1つずつ買うと合計700円で、定価で買うより200円安くなりました。商品AとBの定価は、それぞれ何円ですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["商品Aの定価をx円、商品Bの定価をy円とする。","定価の合計は 700 + 200 = 900円：x + y = 900 ……①","売価の合計：0.8x + 0.75y = 700 ……②","②×100：80x + 75y = 70000、①×75：75x + 75y = 67500","差をとると 5x = 2500 → x = 500。①より y = 400"],"answer":"商品A 500円、商品B 400円","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"ma-37-2","subject":"数学","unit":"連立方程式の文章題","no":"【37】(2)","question":"割合を使う連立方程式\n\n6％の食塩水と15％の食塩水を混ぜて、9％の食塩水を300g作ります。6％と15％の食塩水を、それぞれ何g混ぜればよいですか。","hint":"分からない2つの量をx、yとして、2本の式を作ろう。","approach":"まず『何をx、何をyとするか』を決めます。次に、個数・金額・時間・道のりなど、問題文にある2つの関係を式にします。最後は単位を付けて文章で答えます。","steps":["6％の食塩水をx g、15％の食塩水をy gとする。","食塩水の重さ：x + y = 300 ……①","食塩の重さ：0.06x + 0.15y = 0.09×300 = 27 ……②","②×100：6x + 15y = 2700、①×6：6x + 6y = 1800","差をとると 9y = 900 → y = 100。①より x = 200"],"answer":"6%の食塩水 200g、15%の食塩水 100g","caution":"x、yが何を表すかを最初に書き、最後は『円』『m』『km』『日』『g』などの単位まで付けます。","mathHtml":"","answerMathHtml":"","stepMathHtml":["","","","",""]},{"id":"jp-kanji-1-1","subject":"国語","unit":"漢字の書き取り","no":"プリント1・1","question":"国政の実権をニギる","answer":"握る","mathHtml":"","answerMathHtml":""},{"id":"jp-kanji-1-2","subject":"国語","unit":"漢字の書き取り","no":"プリント1・2","question":"セイジャクに包まれる","answer":"静寂","mathHtml":"","answerMathHtml":""},{"id":"jp-kanji-1-3","subject":"国語","unit":"漢字の書き取り","no":"プリント1・3","question":"カジョウ書きにする","answer":"箇条書き","mathHtml":"","answerMathHtml":""},{"id":"jp-kanji-1-4","subject":"国語","unit":"漢字の書き取り","no":"プリント1・4","question":"任地にオモムく","answer":"赴く","mathHtml":"","answerMathHtml":""},{"id":"jp-kanji-1-5","subject":"国語","unit":"漢字の書き取り","no" const META={"英語":{icon:"📖",color:"english"},"数学":{icon:"➗",color:"math"},"国語":{icon:"✏️",color:"japanese"}};
const KEY="summer-mastered-offline-v1",SOUND_KEY="nekopon-sound-v1",STREAK_KEY="nekopon-streak-v1";
let state={subject:"数学",unit:"すべて",mode:"remaining",index:0,flipped:false,order:[]};
let mastered=new Set(JSON.parse(localStorage.getItem(KEY)||"[]"));
let neko={sound:localStorage.getItem(SOUND_KEY)==="on",streak:Number(sessionStorage.getItem(STREAK_KEY)||0)};
let audioCtx=null,noticeTimer=null;
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function shuffled(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function base(){return CARDS.filter(c=>c.subject===state.subject&&(state.unit==="すべて"||c.unit===state.unit))}
function deck(){let a=base().filter(c=>state.mode==="all"||(state.mode==="remaining"?!mastered.has(c.id):mastered.has(c.id)));if(state.order.length){const r=new Map(state.order.map((id,i)=>[id,i]));a.sort((x,y)=>(r.get(x.id)??99999)-(r.get(y.id)??99999))}return a}
function save(){localStorage.setItem(KEY,JSON.stringify([...mastered]))}
function reset(){state.index=0;state.flipped=false}
function nekoLevel(){return Math.max(1,Math.floor(mastered.size/12)+1)}
function setStreak(n){neko.streak=Math.max(0,n);sessionStorage.setItem(STREAK_KEY,String(neko.streak))}
function pointAt(el){const r=el?.getBoundingClientRect?.();return r?{x:r.left+r.width/2,y:r.top+r.height/2}:{x:innerWidth/2,y:innerHeight/2}}
function tapBurst(el,icons=['✨','🌟','🐾'],count=8){
  if(reduceMotion)return;const p=pointAt(el);
  const ripple=document.createElement('i');ripple.className='tap-ripple';ripple.style.left=p.x+'px';ripple.style.top=p.y+'px';document.body.appendChild(ripple);setTimeout(()=>ripple.remove(),700);
  for(let i=0;i<count;i++){const s=document.createElement('span'),a=(Math.PI*2*i/count)+(Math.random()*.35),d=36+Math.random()*48;s.className='cute-particle';s.textContent=icons[i%icons.length];s.style.left=p.x+'px';s.style.top=p.y+'px';s.style.setProperty('--dx',Math.cos(a)*d+'px');s.style.setProperty('--dy',Math.sin(a)*d+'px');document.body.appendChild(s);setTimeout(()=>s.remove(),1250)}
}
function floatPoints(el,text){const p=pointAt(el),s=document.createElement('span');s.className='floating-points';s.textContent=text;s.style.left=p.x+'px';s.style.top=(p.y-8)+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),1600)}
function showNotice(text){let n=document.querySelector('#nekoNotice');if(!n){n=document.createElement('div');n.id='nekoNotice';n.className='neko-notice';document.body.appendChild(n)}n.textContent=text;requestAnimationFrame(()=>n.classList.add('show'));clearTimeout(noticeTimer);noticeTimer=setTimeout(()=>n.classList.remove('show'),1800)}
function playTone(kind='tap'){
  if(!neko.sound)return;
  try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const now=audioCtx.currentTime,notes=kind==='done'?[523,659,784]:kind==='shuffle'?[392,523]:[440];notes.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.0001,now+i*.07);g.gain.exponentialRampToValueAtTime(.09,now+i*.07+.01);g.gain.exponentialRampToValueAtTime(.0001,now+i*.07+.17);o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.07);o.stop(now+i*.07+.19)})}catch(_){neko.sound=false}
}
function render(){
  const b=base(),d=deck(),done=b.filter(c=>mastered.has(c.id)).length,remain=b.length-done;
  if(state.index>=d.length)state.index=Math.max(0,d.length-1);

  const modes=[["remaining","まだ",remain],["all","ぜんぶ",b.length],["mastered","できた",done]],app=document.querySelector("#app");
  app.className="app "+META[state.subject].color;
  app.innerHTML='<header class="top"><div class="brand"><div class="brand-copy"><p class="neko-kicker"><span class="brand-cat" id="leftCat">🐱</span><span>できるまで、くり返すにゃ〜♪</span><span class="brand-cat" id="rightCat">🐱</span></p><h1 id="gameTitle">Nekoponの夏休み</h1><p class="school-version">港川中２バージョン</p></div><div class="header-tools"><div class="count">'+(d.length?state.index+1:0)+' / '+d.length+'</div><button id="soundToggle" class="sound" aria-label="音を'+(neko.sound?'消す':'出す')+'">'+(neko.sound?'🔊':'🔇')+'</button></div></div><div class="neko-stats"><button class="stat-bubble" data-stat="score"><span class="stat-icon">✨</span><span>'+mastered.size*10+'</span></button><button class="stat-bubble" data-stat="streak"><span class="stat-icon">🔥</span><span>'+neko.streak+'</span></button><button class="stat-bubble" data-stat="level"><span class="stat-icon">🏆</span><span>Lv.'+nekoLevel()+'</span></button></div><nav class="subjects">'+Object.keys(META).map(s=>'<button data-subject="'+s+'" class="'+(s===state.subject?'active':'')+'"><span class="subject-icon">'+META[s].icon+'</span><span>'+s+'</span></button>').join('')+'</nav><div class="progress"><div class="progresscopy"><strong>できた '+done+'問</strong><span>あと '+remain+'問にゃ</span></div><div class="track"><i style="width:'+(b.length?done/b.length*100:0)+'%"></i></div></div><div class="filters"><div class="modes">'+modes.map(m=>'<button data-mode="'+m[0]+'" class="'+(state.mode===m[0]?'active':'')+'">'+m[1]+' '+m[2]+'</button>').join('')+'</div><button id="shuffle" class="shuffle">🎲 シャッフルにゃ</button></div><div class="chips">'+units.map(u=>'<button data-unit="'+esc(u)+'" class="'+(u===state.unit?'active':'')+'">'+esc(u)+'</button>').join('')+'</div></header><section class="stage">'+(c?cardHtml(c):emptyHtml(remain))+'</section>';
  bind();
}
function cardHtml(c){
  const front='<div class="head"><span class="badge">'+META[state.subject].icon+' '+state.subject+'</span><span>'+esc(c.no)+'</span></div><div class="front"><p class="unit">'+esc(c.unit)+'</p><div class="question">'+esc(c.question)+'</div>'+(c.mathHtml?'<div class="formula">'+c.mathHtml+'</div>':'')+(c.hint?'<p class="hint">ヒント：'+esc(c.hint)+'</p>':'')+'</div><div class="guide">タップして答えを見るにゃ〜♪</div>';
  const worked=c.worked?.length?'<section class="worked"><h2>途中計算を縦に見よう</h2>'+c.worked.map(w=>'<div class="work"><h3>'+esc(w.title)+'</h3>'+(w.note?'<p>'+esc(w.note)+'</p>':'')+(w.mathHtml?'<div class="formula">'+w.mathHtml+'</div>':'')+'</div>').join('')+'</section>':'';
  const steps=c.steps?.length?'<section class="block"><h2>一行ずつ確認しよう</h2><ol class="steps">'+c.steps.map((s,i)=>'<li>'+(c.stepMathHtml?.[i]?'<div class="formula">'+c.stepMathHtml[i]+'</div>':esc(s))+'</li>').join('')+'</ol></section>':'';
  const answer=c.answerMathHtml?'<div class="formula">'+c.answerMathHtml+'</div>':'<strong>'+esc(c.answer)+'</strong>';
  const back='<div class="head"><span class="badge">🐱 解答・解説</span><span>'+esc(c.no)+'</span></div><div class="back">'+(c.approach?'<section class="block"><h2>まず、どう考える？</h2><p>'+esc(c.approach)+'</p></section>':'')+worked+steps+'<section class="answer"><small>答えだにゃ！</small>'+answer+'</section>'+(c.caution?'<section class="caution"><h2>ここに注意だにゃ</h2><p>'+esc(c.caution)+'</p></section>':'')+'</div>';
  return '<div id="card" class="card'+(state.flipped?' is-back':'')+'" tabindex="0">'+(state.flipped?back:front)+'</div><div class="actions"><button id="prev" aria-label="前の問題">←</button><button id="again" class="again">↺ もう一度にゃ</button><button id="done" class="done">✓ できたにゃ！</button><button id="next" aria-label="次の問題">→</button></div>';
}
function emptyHtml(remain){if(state.mode==="remaining"&&remain===0)return '<div class="empty"><h2>ぜんぶできたにゃ！</h2><p>すごいにゃ〜♪ 日をあけて、もう一周するともっと安心。</p><button id="resetScope">もう一周するにゃ</button></div>';return '<div class="empty"><h2>この条件の問題はないにゃ</h2><p>「まだ」か「ぜんぶ」に切り替えてみてにゃ。</p></div>'}
function move(n){const d=deck();if(!d.length)return;state.index=(state.index+n+d.length)%d.length;state.flipped=false;render()}
function bind(){
  document.querySelectorAll('[data-subject]').forEach(x=>x.onclick=()=>{tapBurst(x,[META[x.dataset.subject].icon,'✨'],5);playTone();state.subject=x.dataset.subject;state.unit="すべて";state.mode="remaining";state.order=[];reset();setTimeout(render,100)});
  document.querySelectorAll('[data-unit]').forEach(x=>x.onclick=()=>{tapBurst(x,['🐾','✨'],4);state.unit=x.dataset.unit;state.order=[];reset();setTimeout(render,80)});
  document.querySelectorAll('[data-mode]').forEach(x=>x.onclick=()=>{tapBurst(x,['✨'],3);state.mode=x.dataset.mode;reset();setTimeout(render,70)});
  const sh=document.querySelector('#shuffle');
  if(sh)sh.onclick=()=>{tapBurst(sh,['🎲','✨','🐾'],9);floatPoints(sh,'まぜまぜ〜♪');playTone('shuffle');showNotice('順番をシャッフルしたにゃ〜♪');state.order=shuffled(deck().map(c=>c.id));reset();setTimeout(render,180)};
  const c=document.querySelector('#card');
  if(c){
    c.onclick=()=>{if(suppressClick){suppressClick=false;return}state.flipped=!state.flipped;playTone();render()};
    c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();state.flipped=!state.flipped;playTone();render()}else if(e.key==='ArrowRight')move(1);else if(e.key==='ArrowLeft')move(-1)};
  }
  document.querySelector('#prev')?.addEventListener('click',()=>{playTone();move(-1)});
  document.querySelector('#next')?.addEventListener('click',()=>{playTone();move(1)});
  document.querySelector('#done')?.addEventListener('click',e=>{
    const card=deck()[state.index];if(!card)return;
    const first=!mastered.has(card.id),btn=e.currentTarget;btn.disabled=true;btn.classList.add('celebrate');
    if(first){mastered.add(card.id);setStreak(neko.streak+1)}
    save();tapBurst(btn,['✨','🌟','😸','💛'],neko.streak>=5?14:10);floatPoints(btn,first?'+10 できたにゃ！':'できたにゃ！');playTone('done');
    showNotice(neko.streak>=5?'🔥 '+neko.streak+'回つづいているにゃ！':'えらいにゃ！ その調子〜♪');
    state.flipped=false;if(state.mode!=="remaining")state.index++;setTimeout(render,420);
  });
  document.querySelector('#again')?.addEventListener('click',e=>{
    const card=deck()[state.index];if(!card)return;
    const cur=state.order.length?state.order:deck().map(x=>x.id);setStreak(0);mastered.delete(card.id);save();state.order=[...cur.filter(id=>id!==card.id),card.id];state.flipped=false;
    tapBurst(e.currentTarget,['🐾','🧡'],6);floatPoints(e.currentTarget,'あとでもう一度にゃ');playTone();showNotice('だいじょうぶ。後ろでもう一度出すにゃ');setTimeout(render,300);
  });
  document.querySelector('#resetScope')?.addEventListener('click',e=>{tapBurst(e.currentTarget,['🌟','🐾','✨'],12);const ids=new Set(base().map(c=>c.id));mastered=new Set([...mastered].filter(id=>!ids.has(id)));save();setStreak(0);state.mode="remaining";state.order=[];reset();showNotice('もう一周、いってみるにゃ〜♪');setTimeout(render,260)});
  const sound=document.querySelector('#soundToggle');
  if(sound)sound.onclick=e=>{neko.sound=!neko.sound;localStorage.setItem(SOUND_KEY,neko.sound?'on':'off');e.currentTarget.textContent=neko.sound?'🔊':'🔇';e.currentTarget.setAttribute('aria-label',neko.sound?'音を消す':'音を出す');tapBurst(e.currentTarget,[neko.sound?'🎵':'🐾','✨'],5);if(neko.sound)playTone('done');showNotice(neko.sound?'音をオンにしたにゃ♪':'音をオフにしたにゃ')};
  const bounceTitle=el=>{const title=document.querySelector('#gameTitle');title?.animate([{transform:'scale(1)'},{transform:'scale(1.12)'},{transform:'scale(.97)'},{transform:'scale(1)'}],{duration:650,easing:'cubic-bezier(.25,.8,.25,1.2)'});el?.animate([{transform:'scale(1) rotate(0)'},{transform:'scale(1.6) rotate(15deg)'},{transform:'scale(1.2) rotate(-8deg)'},{transform:'scale(1) rotate(0)'}],{duration:700});tapBurst(el||title,['🐱','✨','💛','🐾'],10);playTone('done');showNotice('Nekoponといっしょにがんばるにゃ〜♪')};
  document.querySelector('#gameTitle')?.addEventListener('click',e=>bounceTitle(e.currentTarget));
  document.querySelectorAll('.brand-cat').forEach(x=>x.onclick=e=>{e.stopPropagation();bounceTitle(e.currentTarget)});
  document.querySelectorAll('[data-stat]').forEach(x=>x.onclick=e=>{const type=x.dataset.stat;tapBurst(x,[type==='score'?'✨':type==='streak'?'🔥':'🏆','🐾'],6);playTone();showNotice(type==='score'?'できた問題×10ポイントだにゃ':type==='streak'?'つづけて「できた」にした数だにゃ':'12問できるとレベルアップだにゃ')});
}

/* ---- スワイプでカード送り（iOS Safariのジェスチャー横取り対策込み） ---- */
const appEl=document.querySelector('#app');
const reduceMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let suppressClick=false;
const drag={on:false,el:null,lock:null,noSwipe:false,x0:0,y0:0,t0:0,dx:0,dy:0,id:null,peakX:0,lastT:0,lastDx:0,vel:0};
function snap(el){if(!el)return;el.style.transition='transform .3s cubic-bezier(.2,.9,.25,1),opacity .2s';el.style.transform='translateX(0) rotate(0)';el.style.opacity='1'}
function animateNav(dir,el){
  if(deck().length<=1){snap(el);return}
  if(reduceMotion){move(dir);return}
  const w=el.offsetWidth+70;
  el.style.transition='transform .18s ease-in,opacity .18s ease-in';
  el.style.transform='translateX('+(dir>0?-w:w)+'px) rotate('+(dir>0?-6:6)+'deg)';
  el.style.opacity='0';
  setTimeout(()=>{
    move(dir);
    const nc=document.querySelector('#card');
    if(!nc)return;
    nc.style.transition='none';nc.style.transform='translateX('+(dir>0?w:-w)+'px)';nc.style.opacity='0';
    void nc.offsetWidth;
    nc.style.transition='transform .28s cubic-bezier(.2,.8,.2,1),opacity .2s ease';
    nc.style.transform='translateX(0)';nc.style.opacity='1';
  },180);
}
appEl.addEventListener('pointerdown',e=>{
  const card=e.target.closest('#card');
  if(!card)return;
  suppressClick=false;
  const f=e.target.closest('.formula');
  drag.noSwipe=!!(f&&f.scrollWidth>f.clientWidth+1);
  drag.on=true;drag.el=card;drag.lock=null;drag.dx=0;drag.dy=0;drag.peakX=0;
  drag.x0=e.clientX;drag.y0=e.clientY;drag.t0=Date.now();drag.lastT=drag.t0;drag.lastDx=0;drag.vel=0;drag.id=e.pointerId;
  card.style.transition='none';
});
/* Safariにジェスチャーを奪われない：横方向の動きなら最初のtouchmoveでスクロール開始を阻止 */
appEl.addEventListener('touchmove',e=>{
  if(!drag.on||drag.noSwipe||e.touches.length!==1)return;
  if(drag.lock==='h'){e.preventDefault();return}
  if(drag.lock===null){
    const t=e.touches[0],ax=Math.abs(t.clientX-drag.x0),ay=Math.abs(t.clientY-drag.y0);
    if(ax>=ay)e.preventDefault();
  }
},{passive:false});
appEl.addEventListener('pointermove',e=>{
  if(!drag.on||e.pointerId!==drag.id)return;
  drag.dx=e.clientX-drag.x0;drag.dy=e.clientY-drag.y0;
  if(drag.lock===null&&(Math.abs(drag.dx)>4||Math.abs(drag.dy)>4)){
    drag.lock=Math.abs(drag.dx)>=Math.abs(drag.dy)?'h':'v';
    if(drag.lock==='h'&&!drag.noSwipe){try{drag.el.setPointerCapture(drag.id)}catch(_){}}
  }
  if(drag.lock==='h'&&!drag.noSwipe){
    const dx=drag.dx;
    if(Math.abs(dx)>Math.abs(drag.peakX))drag.peakX=dx;
    const now=Date.now(),tdt=now-drag.lastT;
    if(tdt>0){drag.vel=(dx-drag.lastDx)/tdt;drag.lastT=now;drag.lastDx=dx}
    drag.el.style.transform='translateX('+dx+'px) rotate('+(dx*0.04)+'deg)';
    drag.el.style.opacity=String(Math.max(.5,1-Math.abs(dx)/620));
  }
});
function endDrag(e){
  if(!drag.on)return;drag.on=false;
  const el=drag.el,dt=Date.now()-drag.t0,dx=drag.dx,ax=Math.abs(dx),lock=drag.lock,wasNoSwipe=drag.noSwipe;
  const peakX=drag.peakX,apk=Math.abs(peakX),instVel=Math.abs(drag.vel);
  drag.lock=null;drag.noSwipe=false;drag.peakX=0;drag.vel=0;drag.el=null;
  try{el.releasePointerCapture(e.pointerId)}catch(_){}
  if(lock==='h'&&!wasNoSwipe){
    if(ax>8)suppressClick=true;
    const vel=ax/Math.max(dt,1);
    if(ax>20||vel>0.18||instVel>0.18)animateNav(dx<0?1:-1,el);
    else if(apk>48&&ax>=apk*0.55)animateNav(peakX<0?1:-1,el);
    else snap(el);
  }
  else snap(el);
}
appEl.addEventListener('pointerup',endDrag);
appEl.addEventListener('pointercancel',()=>{
  if(!drag.on)return;drag.on=false;
  /* OSにジェスチャーを奪われても、すでに十分動かしていたらスワイプ成立として救済 */
  const el=drag.el,wasH=drag.lock==='h',wasNoSwipe=drag.noSwipe,dx=drag.dx,pk=drag.peakX,ax=Math.abs(dx),apk=Math.abs(pk);
  drag.lock=null;drag.noSwipe=false;drag.peakX=0;drag.vel=0;drag.el=null;
  if(wasH&&!wasNoSwipe&&(ax>32||apk>60)){suppressClick=true;animateNav((ax>=apk*0.55?dx:pk)<0?1:-1,el)}
  else snap(el);
});
render();
</script></body></html>
